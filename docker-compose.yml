version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    restart: always
    ports:
      - "8080:80"
    environment:
      - APP_ENV=production
      - APP_DEBUG=false
      - DB_CONNECTION=mysql
      - DB_HOST=db
      - DB_PORT=3306
      - DB_DATABASE=${DB_DATABASE:-hindutakht}
      - DB_USERNAME=${DB_USERNAME:-hindutakht_user}
      - DB_PASSWORD=${DB_PASSWORD:-hindutakht_password}
    depends_on:
      - db
    volumes:
      - storage-data:/var/www/html/storage

  db:
    image: mysql:8.0
    restart: always
    environment:
      MYSQL_DATABASE: ${DB_DATABASE:-hindutakht}
      MYSQL_USER: ${DB_USERNAME:-hindutakht_user}
      MYSQL_PASSWORD: ${DB_PASSWORD:-hindutakht_password}
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-root_password}
    ports:
      - "3306:3306"
    volumes:
      - db-data:/var/lib/mysql

volumes:
  storage-data:
  db-data:
